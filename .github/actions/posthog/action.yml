name: PostHog Capture
description: Send a workflow analytics event to PostHog

inputs:
  api_key:
    description: "PostHog project API key"
    required: true
  github_repository:
    description: "GitHub repository in the format 'owner/repo' (e.g. 'entur/gha-meta')"
    required: true
  workflow_inputs:
    description: "Workflow inputs as a JSON string (e.g. toJSON(inputs))"
    required: false
    default: "{}"
  workflow_name:
    description: "Name of the workflow. Used as the event name in PostHog."
    required: true

runs:
  using: composite
  steps:
    - name: Resolve action version
      id: workflow_version
      shell: bash
      run: |
        set +e
        set +o pipefail

        # Resolve version by finding this reusable workflow's entry in the caller's run.
        # (GITHUB_WORKFLOW_REF is the caller's ref, not the reusable workflow's ref)
        RUN_DATA=$(curl -sf \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || echo "{}")

        GHA_SHA=$(echo "$RUN_DATA" | jq -r '(.referenced_workflows // [])[] | select(.path | startswith($GITHUB_REPOSITORY)) | .sha' | head -1)
        GHA_REF=$(echo "$RUN_DATA" | jq -r '(.referenced_workflows // [])[] | select(.path | startswith($GITHUB_REPOSITORY)) | .ref // ""' | head -1)

        WORKFLOW_VERSION=""
        if [ -n "$GHA_REF" ]; then
          WORKFLOW_VERSION="${GHA_REF}"
        elif [ -n "$GHA_SHA" ]; then
          WORKFLOW_VERSION="${GHA_SHA:0:7}"
        fi

        echo "Workflow version: $WORKFLOW_VERSION"
        echo "workflow_version=${WORKFLOW_VERSION}" >> "$GITHUB_OUTPUT"
    - name: Send event
      shell: bash
      env:
        POSTHOG_API_KEY:   ${{ inputs.api_key }}
        WORKFLOW_INPUTS:   ${{ inputs.workflow_inputs }}
        WORKFLOW_NAME:     ${{ inputs.workflow_name }}
        WORKFLOW_VERSION:  ${{ steps.workflow_version.outputs.workflow_version }}
        GITHUB_TOKEN:      ${{ github.token }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
      run: |
        set +e
        set +o pipefail

        payload=$(jq -n \
          --arg     api_key  "$POSTHOG_API_KEY" \
          --arg     repo     "$GITHUB_REPOSITORY" \
          --arg     name     "$WORKFLOW_NAME" \
          --arg     version  "$WORKFLOW_VERSION" \
          --argjson inputs   "$WORKFLOW_INPUTS" \
          --arg     event    "$GITHUB_EVENT_NAME" \
          --arg     run_id   "$GITHUB_RUN_ID" \
          '{
            api_key:     $api_key,
            event:       $name,
            distinct_id: $repo,
            properties: (
              {
                workflow_name:    $name,
                workflow_version: $version,
                repository:       $repo,
                event_name:       $event,
                run_id:           $run_id
              }
              + ($inputs | with_entries(.key = ("input_" + .key)))
            )
          }')

        curl -s --max-time 5 \
          -H "Content-Type: application/json" \
          -d "$payload" \
          https://eu.posthog.com/capture/ || true
